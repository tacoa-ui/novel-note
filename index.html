<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小説note 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --lime: #A6F21A; --bg: #000000; }
        body { background-color: var(--bg); color: white; padding-bottom: 110px; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .text-lime { color: var(--lime); }
        .bg-lime { background-color: var(--lime); color: black; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .page-section { display: none; }
        .page-section.active { display: block; animation: pageIn 0.2s ease-out; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 9px; font-weight: bold; color: #666; transition: 0.2s; }
        .nav-btn.active { color: var(--lime); }
        .glass { background: rgba(255,255,255,0.07); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        
        input, textarea, select { background: rgba(255,255,255,0.1) !important; color: white !important; border-radius: 14px; padding: 14px; outline: none; border: 1px solid transparent; width: 100%; }
        input:focus { border-color: var(--lime); }
        
        .badge-top { background: linear-gradient(45deg, #FFD700, #FFA500); color: black; font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 900; }
        .comment-in { animation: cIn 0.3s ease-out; }
        @keyframes cIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-black/95 p-4 border-b border-white/5">
        <div class="relative mb-3">
            <i class="fa fa-search absolute left-4 top-4 text-gray-500"></i>
            <input type="text" id="g-search" oninput="handleSearch()" placeholder="作者・タイトル・タグ・ライブ・room" class="pl-12">
        </div>
        <h1 class="text-3xl font-black text-lime italic tracking-tighter">小説note</h1>
    </header>

    <main id="main-content">
        
        <section id="page-home" class="page-section active p-4 space-y-8">
            <div class="flex overflow-x-auto gap-4 no-scrollbar snap-x">
                <div class="min-w-full h-44 bg-lime rounded-[2rem] p-8 flex flex-col justify-between text-black snap-center">
                    <div>
                        <h2 class="text-xl font-black leading-tight">理想の物語は<br>あなたしか書けない</h2>
                        <p class="text-[10px] font-bold opacity-70">さぁ思いっきり楽しもう！</p>
                    </div>
                    <button onclick="showModal('modal-terms')" class="bg-black text-white text-[10px] px-6 py-2 rounded-full w-fit font-bold">利用規約を見る</button>
                </div>
                <div class="min-w-full h-44 bg-blue-600 rounded-[2rem] p-8 flex flex-col justify-center snap-center">
                    <h2 class="text-2xl font-black italic">連載は自由。<br>楽しむのも自由。</h2>
                </div>
            </div>

            <div id="h-live-box" class="hidden space-y-4">
                <h3 class="font-bold text-sm text-red-500 flex items-center gap-2">
                    <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span> ライブ配信中のライブ
                </h3>
                <div id="h-live-list"></div>
            </div>

            <div>
                <h3 class="font-bold text-sm text-lime mb-4">フォロー中の作品</h3>
                <div id="h-follow-works" class="flex gap-4 overflow-x-auto no-scrollbar"></div>
            </div>

            <div>
                <h3 class="font-bold text-sm mb-4">TOPクリエイター</h3>
                <div id="h-top-creators" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
            </div>
        </section>

        <section id="page-ranking" class="page-section p-4 space-y-12">
            <div><h3 class="font-black text-xl border-l-4 border-lime pl-3 mb-6">TOP 作品 40</h3><div class="grid grid-cols-2 gap-4" id="r-works"></div></div>
            <div><h3 class="font-black text-xl border-l-4 border-white pl-3 mb-6">最新の作品 40</h3><div class="grid grid-cols-2 gap-4" id="r-latest"></div></div>
        </section>

        <section id="page-live" class="page-section p-4 space-y-6">
            <div class="glass rounded-[2.5rem] p-6 flex flex-col items-center gap-6">
                <div class="w-32 h-32 rounded-full border-4 border-lime overflow-hidden bg-gray-900 flex items-center justify-center relative">
                    <img id="l-host-img" class="w-full h-full object-cover hidden">
                    <i id="l-host-icon" class="fa fa-microphone text-3xl text-gray-700"></i>
                </div>
                
                <input type="text" id="l-title" placeholder="ライブタイトル..." class="text-center font-black bg-transparent border-none text-xl p-0">
                <textarea id="l-desc" placeholder="ライブの概要・あらすじ" class="h-20 text-xs bg-white/5"></textarea>

                <div class="text-center">
                    <p id="l-viewers" class="text-lime font-black text-lg">0 Viewers</p>
                    <button id="l-toggle" onclick="toggleLive()" class="bg-white text-black px-12 py-4 rounded-full font-black text-xl mt-2">録音を開始する</button>
                </div>

                <div class="grid grid-cols-3 gap-2 w-full">
                    <button onclick="applyEffect('none')" class="e-btn bg-lime text-black py-3 rounded-xl text-[10px] font-bold">ノーマル</button>
                    <button onclick="applyEffect('echo')" class="e-btn bg-white/5 py-3 rounded-xl text-[10px] font-bold">エコー</button>
                    <button onclick="applyEffect('robot')" class="e-btn bg-white/5 py-3 rounded-xl text-[10px] font-bold">ロボット</button>
                </div>
            </div>

            <div class="glass rounded-[2rem] p-6 h-[250px] flex flex-col">
                <div id="l-chats" class="flex-1 overflow-y-auto space-y-2 no-scrollbar text-[11px] text-gray-500 italic">チャットは配信開始後に表示されます</div>
                <div class="flex gap-2 mt-4">
                    <input type="text" id="l-msg" placeholder="コメント..." class="p-2 text-xs">
                    <button onclick="sendChat()" class="bg-lime text-black px-4 rounded-xl"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>
        </section>

        <section id="page-post" class="page-section p-6 space-y-6">
            <h2 class="text-2xl font-black mb-4 italic">Create New</h2>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="openPost('work')" class="glass p-8 rounded-[2rem] text-left border-l-4 border-lime">
                    <i class="fa fa-pen-nib text-lime text-2xl mb-2"></i>
                    <p class="font-black text-xl">作品を投稿</p>
                </button>
                <button onclick="openPost('room')" class="glass p-8 rounded-[2rem] text-left border-l-4 border-blue-500">
                    <i class="fa fa-folder-open text-blue-500 text-2xl mb-2"></i>
                    <p class="font-black text-xl">Roomを作成</p>
                </button>
            </div>
        </section>

        <section id="page-library" class="page-section p-4 space-y-6">
            <div class="flex gap-4 border-b border-white/10 pb-2">
                <button onclick="setLib('my')" id="lt-my" class="text-lime font-black border-b-2 border-lime pb-2 flex-1">My Works</button>
                <button onclick="setLib('bk')" id="lt-bk" class="text-gray-500 font-black flex-1">Bookmarks</button>
            </div>
            <div id="lib-grid" class="grid grid-cols-1 gap-3"></div>
        </section>

        <section id="page-profile" class="page-section p-6 space-y-8">
            <div class="flex flex-col items-center gap-4">
                <div class="w-28 h-28 rounded-full border-2 border-lime p-1 relative">
                    <div class="w-full h-full rounded-full overflow-hidden bg-gray-800 flex items-center justify-center">
                        <img id="p-icon" class="w-full h-full object-cover hidden">
                        <i id="p-icon-off" class="fa fa-user text-3xl text-gray-600"></i>
                    </div>
                    <input type="file" accept="image/*" onchange="upIcon(this)" class="absolute inset-0 opacity-0">
                </div>
                <input type="text" id="p-name" class="text-2xl font-black bg-transparent text-center" placeholder="名前を登録">
                <textarea id="p-bio" class="text-xs text-gray-400 text-center bg-transparent border-none" placeholder="一言・設定"></textarea>
                <button onclick="saveP()" class="bg-white text-black px-10 py-2 rounded-full font-black text-xs">SAVE PROFILE</button>
            </div>
            <div class="flex gap-4">
                <div class="flex-1 glass p-4 rounded-2xl text-center" onclick="showUsers('following')">
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Following</p>
                    <p class="text-xl font-black" id="p-ing">0</p>
                </div>
                <div class="flex-1 glass p-4 rounded-2xl text-center" onclick="showUsers('followers')">
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Followers</p>
                    <p class="text-xl font-black" id="p-ers">0</p>
                </div>
            </div>
            <div class="glass p-6 rounded-3xl space-y-4">
                <h3 class="text-xs font-black text-lime">通知カスタマイズ</h3>
                <div id="notif-list" class="space-y-3"></div>
            </div>
        </section>
    </main>

    <div id="post-modal" class="fixed inset-0 bg-black z-[100] hidden flex flex-col p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 id="modal-head" class="text-xl font-black">新規投稿</h2>
            <button onclick="closePost()" class="text-3xl">&times;</button>
        </div>
        <div class="space-y-4">
            <div class="h-40 glass rounded-2xl relative flex flex-col items-center justify-center overflow-hidden border-2 border-dashed border-white/20">
                <img id="post-img-pre" class="absolute inset-0 w-full h-full object-cover hidden">
                <i class="fa fa-image text-2xl text-gray-600 mb-2"></i>
                <p class="text-[10px] text-gray-500 font-bold">表紙画像を選択</p>
                <input type="file" accept="image/*" onchange="preImg(this)" class="absolute inset-0 opacity-0">
            </div>
            <input type="text" id="post-t" placeholder="タイトル">
            <textarea id="post-d" placeholder="あらすじ・説明文" class="h-24"></textarea>
            <textarea id="post-b" placeholder="本文" class="h-60"></textarea>
            <input type="text" id="post-tag" placeholder="タグ (カンマ区切り)">
            <select id="post-room"><option value="">Roomを選択しない</option></select>
            <select id="post-priv">
                <option value="pub">全体公開</option>
                <option value="fol">フォロワー限定</option>
                <option value="pri">非公開</option>
            </select>
            <button onclick="doPost()" class="w-full bg-lime text-black py-5 rounded-2xl font-black text-lg">公開する</button>
        </div>
    </div>

    <div id="u-modal" class="fixed inset-0 bg-black/95 z-[110] hidden p-8">
        <div class="flex justify-between mb-8"><h2 id="u-title" class="text-xl font-black">Users</h2><button onclick="hideModal('u-modal')" class="text-3xl">&times;</button></div>
        <div id="u-list" class="space-y-4"></div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black/90 backdrop-blur-xl border-t border-white/10 flex justify-around p-4 pb-10 z-50">
        <button onclick="switchTab('home')" class="nav-btn active"><i class="fa fa-house"></i><span>ホーム</span></button>
        <button onclick="switchTab('ranking')" class="nav-btn"><i class="fa fa-trophy"></i><span>ランク</span></button>
        <button onclick="switchTab('post')" class="nav-btn"><i class="fa fa-pencil"></i><span>投稿</span></button>
        <button onclick="switchTab('library')" class="nav-btn"><i class="fa fa-book"></i><span>書庫</span></button>
        <button onclick="switchTab('live')" class="nav-btn"><i class="fa fa-microphone"></i><span>ライブ</span></button>
        <button onclick="switchTab('profile')" class="nav-btn"><i class="fa fa-face-smile"></i><span>プロフ</span></button>
    </nav>

    <div id="modal-terms" class="fixed inset-0 bg-black/98 z-[200] hidden flex items-center justify-center p-8">
        <div class="glass p-10 rounded-[3rem] space-y-6">
            <h2 class="text-xl font-black text-lime italic">利用規約</h2>
            <ul class="text-[10px] text-gray-400 space-y-3 list-disc pl-4">
                <li>著作権の責任は一切負いません。</li>
                <li>商用利用に関する責任は一切負いません。</li>
                <li>内容は適切か確認してください。</li>
            </ul>
            <button onclick="hideModal('modal-terms')" class="w-full bg-lime text-black py-3 rounded-xl font-black">同意</button>
        </div>
    </div>

    <script>
        /* --- 💿 DATA --- */
        let db = JSON.parse(localStorage.getItem('NN_2026_V4')) || {
            me: { name: '', bio: '', icon: '', following: [], followers: [], bookmarks: [], settings: { like:true, comment:true, follow:true } },
            works: [], rooms: []
        };
        const save = () => localStorage.setItem('NN_2026_V4', JSON.stringify(db));

        /* --- 🔊 AUDIO (Web Audio API) --- */
        let ctx, mic, src, dly, flt, g;
        async function startAudio() {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === 'suspended') await ctx.resume();
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                src = ctx.createMediaStreamSource(s);
                dly = ctx.createDelay(); dly.delayTime.value = 0.3;
                g = ctx.createGain(); g.gain.value = 0.4;
                dly.connect(g); g.connect(dly);
                flt = ctx.createBiquadFilter(); flt.type='peaking'; flt.frequency.value=1500; flt.gain.value=25;
                applyEffect('none');
            } catch(e) { console.warn("Mic error"); }
        }

        function applyEffect(type) {
            if(!src) return;
            src.disconnect(); dly.disconnect(); flt.disconnect();
            if(type === 'none') src.connect(ctx.destination);
            if(type === 'echo') { src.connect(dly); dly.connect(ctx.destination); src.connect(ctx.destination); }
            if(type === 'robot') { src.connect(flt); flt.connect(ctx.destination); }
            document.querySelectorAll('.e-btn').forEach(b => { b.classList.replace('bg-lime','bg-white/5'); b.classList.replace('text-black','text-white'); });
            event.target.classList.add('bg-lime','text-black');
        }

        /* --- 📱 UI --- */
        function switchTab(id) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
            render();
        }

        function render() {
            // Home: TOP Creator
            const topNames = [...new Set(db.works.filter(w => isTop(w.id)).map(w => w.author))];
            document.getElementById('h-top-creators').innerHTML = topNames.map(n => `<div class="min-w-[70px] flex flex-col items-center"><div class="w-14 h-14 rounded-full border-2 border-lime p-1"><div class="w-full h-full bg-gray-800 rounded-full"></div></div><p class="text-[8px] mt-1 truncate w-full text-center">${n}</p><span class="badge-top">TOP</span></div>`).join('');
            
            // Ranking
            const topWorks = [...db.works].sort((a,b)=>b.likes-a.likes).slice(0,40);
            document.getElementById('r-works').innerHTML = topWorks.map(renderCard).join('');
            document.getElementById('r-latest').innerHTML = db.works.slice(0,40).map(renderCard).join('');

            // Profile
            document.getElementById('p-ing').innerText = db.me.following.length;
            document.getElementById('p-ers').innerText = db.me.followers.length;
            
            renderLib();
        }

        function isTop(id) { return [...db.works].sort((a,b)=>b.likes-a.likes).slice(0,40).some(w => w.id === id); }

        function renderCard(w) {
            return `<div class="glass rounded-2xl overflow-hidden"><img src="${w.cover}" class="w-full h-24 object-cover"><div class="p-2"><p class="text-[10px] font-black truncate">${w.title}</p><p class="text-[8px] text-gray-500">${w.author} ${isTop(w.id)?'⭐':''}</p><div class="flex justify-between mt-2 items-center"><span class="text-lime text-[10px]"><i class="fa fa-heart"></i> ${w.likes}</span><button onclick="bookmark(${w.id})" class="text-gray-500"><i class="fa fa-bookmark"></i></button></div></div></div>`;
        }

        /* --- 🖋 POST LOGIC --- */
        let postType = 'work';
        function openPost(type) {
            postType = type;
            document.getElementById('post-modal').classList.remove('hidden');
            document.getElementById('post-b').classList.toggle('hidden', type==='room');
            const sel = document.getElementById('post-room');
            sel.innerHTML = '<option value="">Roomを選択しない</option>' + db.rooms.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        }
        function closePost() { document.getElementById('post-modal').classList.add('hidden'); }

        function preImg(input) {
            if(input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => { document.getElementById('post-img-pre').src = e.target.result; document.getElementById('post-img-pre').classList.remove('hidden'); };
                r.readAsDataURL(input.files[0]);
            }
        }

        function doPost() {
            const t = document.getElementById('post-t').value;
            const d = document.getElementById('post-d').value;
            const b = document.getElementById('post-b').value;
            const c = document.getElementById('post-img-pre').src;
            
            // 投稿できない原因の緩和：名前があればOKとする
            if(!t || !d || !c || !db.me.name) return alert("タイトル・説明・画像・名前(プロフ)を入力してください！");
            
            if(postType === 'work') {
                db.works.unshift({ id:Date.now(), title:t, desc:d, body:b, cover:c, author:db.me.name, likes:0, tags:[], privacy:'pub' });
            } else {
                db.rooms.unshift({ id:Date.now(), name:t, desc:d, cover:c, author:db.me.name, subs:0 });
            }
            save(); closePost(); switchTab('home');
        }

        /* --- 🎙 LIVE LOGIC --- */
        let isL = false;
        function toggleLive() {
            const btn = document.getElementById('l-toggle');
            if(!isL) {
                if(!document.getElementById('l-title').value) return alert("タイトルを入力！");
                isL = true; btn.innerText="配信停止"; btn.classList.add('bg-red-600','text-white');
                startAudio();
                document.getElementById('l-chats').innerHTML = '<div class="text-lime text-center">— LIVE START —</div>';
            } else {
                isL = false; btn.innerText="録音を開始する"; btn.classList.remove('bg-red-600','text-white');
            }
        }

        /* --- 👤 PROF LOGIC --- */
        function upIcon(input) {
            if(input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => { 
                    db.me.icon = e.target.result; 
                    document.getElementById('p-icon').src = e.target.result; 
                    document.getElementById('p-icon').classList.remove('hidden'); 
                    document.getElementById('p-icon-off').classList.add('hidden');
                    document.getElementById('l-host-img').src = e.target.result;
                    document.getElementById('l-host-img').classList.remove('hidden');
                    document.getElementById('l-host-icon').classList.add('hidden');
                };
                r.readAsDataURL(input.files[0]);
            }
        }
        function saveP() {
            db.me.name = document.getElementById('p-name').value;
            db.me.bio = document.getElementById('p-bio').value;
            save(); alert("保存完了"); render();
        }

        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function hideModal(id) { document.getElementById(id).classList.add('hidden'); }

        let libMode = 'my';
        function setLib(m) {
            libMode = m;
            document.getElementById('lt-my').className = m==='my' ? 'text-lime font-black border-b-2 border-lime pb-2 flex-1' : 'text-gray-500 font-black flex-1';
            document.getElementById('lt-bk').className = m==='bk' ? 'text-lime font-black border-b-2 border-lime pb-2 flex-1' : 'text-gray-500 font-black flex-1';
            renderLib();
        }
        function renderLib() {
            const list = libMode === 'my' ? db.works.filter(w=>w.author===db.me.name) : db.works.filter(w=>db.me.bookmarks.includes(w.id));
            document.getElementById('lib-grid').innerHTML = list.map(w => `<div class="glass p-3 rounded-2xl flex gap-3 items-center"><img src="${w.cover}" class="w-12 h-12 rounded-xl object-cover"><div class="flex-1 font-black text-xs">${w.title}</div><button onclick="delW(${w.id})" class="text-red-500"><i class="fa fa-trash"></i></button></div>`).join('');
        }
        function delW(id) { if(confirm("消す？")) { db.works = db.works.filter(w=>w.id!==id); save(); render(); } }

        // 初期設定
        if(db.me.name) document.getElementById('p-name').value = db.me.name;
        if(db.me.bio) document.getElementById('p-bio').value = db.me.bio;
        if(db.me.icon) {
            document.getElementById('p-icon').src = db.me.icon; document.getElementById('p-icon').classList.remove('hidden');
            document.getElementById('l-host-img').src = db.me.icon; document.getElementById('l-host-img').classList.remove('hidden');
            document.getElementById('p-icon-off').classList.add('hidden'); document.getElementById('l-host-icon').classList.add('hidden');
        }
        render();
    </script>
</body>
</html>
