<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小説note 2026 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --lime: #A6F21A; --bg: #000000; }
        body { background-color: var(--bg); color: white; padding-bottom: 90px; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        .text-lime { color: var(--lime); }
        .bg-lime { background-color: var(--lime); color: black; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-section { display: none; }
        .tab-section.active { display: block; }
        input, textarea { background-color: rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50 bg-black/95 backdrop-blur-md p-4 border-b border-white/10 flex flex-col gap-3">
        <h1 class="text-3xl font-black text-lime">小説note</h1>
    </header>

    <main id="app-content">
        <section id="tab-home" class="tab-section active p-4 space-y-6">
            <div class="bg-gradient-to-br from-lime-400 to-green-600 rounded-3xl p-6 text-black mb-6">
                <h2 class="text-xl font-black leading-tight">理想の物語は<br>あなたしか書けない</h2>
                <p class="text-xs font-bold mt-1 opacity-80">さぁ思いっきり楽しもう！</p>
            </div>
            <h3 class="font-bold text-lime italic">新着作品</h3>
            <div id="grid-latest" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="tab-live" class="tab-section p-6 flex flex-col items-center">
            <div class="w-32 h-32 rounded-full bg-white/5 border-4 border-lime flex items-center justify-center text-5xl mb-6 overflow-hidden">
                <img id="live-icon-view" class="w-full h-full object-cover hidden">
                <span id="live-placeholder">👤</span>
            </div>
            <button id="btn-record" onclick="toggleRecording()" class="w-full bg-white text-black py-4 rounded-2xl font-black text-xl mb-4">録音を開始する</button>
            <div class="grid grid-cols-3 gap-2 w-full">
                <button onclick="setVoice('normal')" class="v-btn bg-lime text-black py-3 rounded-xl text-[10px] font-bold">ノーマル</button>
                <button onclick="setVoice('echo')" class="v-btn bg-white/10 py-3 rounded-xl text-[10px] font-bold">エコー</button>
                <button onclick="setVoice('robot')" class="v-btn bg-white/10 py-3 rounded-xl text-[10px] font-bold">ロボット</button>
            </div>
        </section>

        <section id="tab-post" class="tab-section p-4 space-y-4">
            <h2 class="text-2xl font-black border-b border-white/10 pb-2">作品を創る</h2>
            <p class="text-[10px] text-gray-400">投稿者: <span id="post-author-name" class="text-lime">あなた</span></p>
            <div class="bg-white/5 h-40 rounded-3xl border-2 border-dashed border-white/20 flex flex-col items-center justify-center relative overflow-hidden">
                <input type="file" class="absolute inset-0 opacity-0 z-10" accept="image/*" onchange="previewImg(this)">
                <img id="p-preview" class="absolute inset-0 w-full h-full object-cover hidden">
                <div id="p-label" class="text-center text-gray-500"><i class="fa fa-image text-2xl"></i><p class="text-[10px]">表紙を選択</p></div>
            </div>
            <input type="text" id="p-title" placeholder="タイトル" class="w-full p-4 rounded-xl outline-none border border-white/5">
            <textarea id="p-desc" placeholder="あらすじ" class="w-full p-4 rounded-xl h-20 outline-none"></textarea>
            <textarea id="p-body" placeholder="本文" class="w-full p-4 rounded-xl h-48 outline-none"></textarea>
            <button onclick="doPost()" class="w-full bg-lime text-black py-4 rounded-2xl font-black text-lg">投稿する</button>
        </section>

        <section id="tab-library" class="tab-section p-4">
            <h2 class="text-2xl font-black mb-4">マイライブラリ</h2>
            <div id="lib-grid" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="tab-profile" class="tab-section p-6 space-y-6">
            <div class="flex items-center gap-6">
                <div class="w-24 h-24 rounded-full bg-gray-800 border-2 border-lime relative overflow-hidden">
                    <input type="file" class="absolute inset-0 opacity-0 z-10" onchange="upIcon(this)">
                    <img id="u-icon" class="w-full h-full object-cover hidden">
                    <div class="absolute inset-0 flex items-center justify-center text-gray-500"><i class="fa fa-camera"></i></div>
                </div>
                <div class="flex-1">
                    <p class="text-[10px] text-lime font-bold">名前の変更</p>
                    <input type="text" id="u-name" class="w-full p-2 rounded-lg font-black text-xl outline-none mb-2" oninput="syncName()">
                    <button onclick="saveU()" class="w-full bg-white text-black text-xs py-2 rounded-lg font-bold">保存を確定する</button>
                </div>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl">
                <p class="text-xs text-gray-400">自己紹介</p>
                <textarea id="u-bio" class="w-full bg-transparent mt-2 text-sm outline-none" rows="2"></textarea>
            </div>
            <div class="flex gap-4">
                <div class="flex-1 bg-white/5 p-4 rounded-xl text-center"><p class="text-[10px] text-gray-500">フォロー</p><p class="font-bold">0</p></div>
                <div class="flex-1 bg-white/5 p-4 rounded-xl text-center"><p class="text-[10px] text-gray-500">フォロワー</p><p class="font-bold">0</p></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full bg-black border-t border-white/10 flex justify-around p-4 z-50">
        <button onclick="switchTab('home')" class="nav-btn text-lime"><i class="fa fa-house text-2xl"></i></button>
        <button onclick="switchTab('library')" class="nav-btn text-gray-600"><i class="fa fa-book text-2xl"></i></button>
        <button onclick="switchTab('post')" class="nav-btn text-gray-600"><i class="fa fa-pencil text-2xl"></i></button>
        <button onclick="switchTab('live')" class="nav-btn text-gray-600"><i class="fa fa-microphone text-2xl"></i></button>
        <button onclick="switchTab('profile')" class="nav-btn text-gray-600"><i class="fa fa-face-smile text-2xl"></i></button>
    </nav>

    <script>
        // --- データ管理 ---
        let data = JSON.parse(localStorage.getItem('NOVEL_NOTE_2026_FINAL')) || {
            user: { name: 'あなた', bio: 'よろしくお願いします', icon: '' },
            works: []
        };
        const saveAll = () => localStorage.setItem('NOVEL_NOTE_2026_FINAL', JSON.stringify(data));

        // --- タブ切り替え ---
        function switchTab(id) {
            document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-lime', 'text-gray-600'));
            event.currentTarget.classList.replace('text-gray-600', 'text-lime');
            if(id === 'home') renderHome();
            if(id === 'library') renderLib();
        }

        // --- プロフィール処理 ---
        function initProfile() {
            document.getElementById('u-name').value = data.user.name;
            document.getElementById('u-bio').value = data.user.bio;
            document.getElementById('post-author-name').innerText = data.user.name;
            if(data.user.icon) {
                document.getElementById('u-icon').src = data.user.icon;
                document.getElementById('u-icon').classList.remove('hidden');
                document.getElementById('live-icon-view').src = data.user.icon;
                document.getElementById('live-icon-view').classList.remove('hidden');
                document.getElementById('live-placeholder').classList.add('hidden');
            }
        }

        function syncName() {
            const n = document.getElementById('u-name').value;
            document.getElementById('post-author-name').innerText = n || 'あなた';
        }

        function saveU() {
            data.user.name = document.getElementById('u-name').value || 'あなた';
            data.user.bio = document.getElementById('u-bio').value;
            saveAll();
            alert("名前を保存しました！");
        }

        function upIcon(input) {
            if(input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => { data.user.icon = e.target.result; saveAll(); initProfile(); };
                r.readAsDataURL(input.files[0]);
            }
        }

        // --- 投稿処理 ---
        function previewImg(input) {
            if(input.files && input.files[0]) {
                const r = new FileReader();
                r.onload = e => { 
                    document.getElementById('p-preview').src = e.target.result; 
                    document.getElementById('p-preview').classList.remove('hidden'); 
                    document.getElementById('p-label').classList.add('hidden');
                };
                r.readAsDataURL(input.files[0]);
            }
        }

        function doPost() {
            const t = document.getElementById('p-title').value;
            const d = document.getElementById('p-desc').value;
            const b = document.getElementById('p-body').value;
            const img = document.getElementById('p-preview').src;
            if(!t || !d || !b || img.includes('hidden')) return alert("全部入力してください！");

            data.works.unshift({ id: Date.now(), title: t, desc: d, body: b, cover: img, author: data.user.name });
            saveAll();
            alert("投稿しました！");
            document.getElementById('p-title').value = '';
            document.getElementById('p-desc').value = '';
            document.getElementById('p-body').value = '';
            switchTab('home');
        }

        // --- 表示処理 ---
        function renderHome() {
            const html = data.works.map(w => `
                <div class="bg-white/5 rounded-2xl overflow-hidden">
                    <img src="${w.cover}" class="w-full h-32 object-cover">
                    <div class="p-3">
                        <p class="font-bold text-xs truncate">${w.title}</p>
                        <p class="text-[10px] text-gray-500 mt-1">by ${w.author}</p>
                    </div>
                </div>
            `).join('');
            document.getElementById('grid-latest').innerHTML = html || '<p class="text-gray-600 text-[10px]">まだ作品がありません</p>';
        }

        function renderLib() {
            const html = data.works.map(w => `
                <div class="bg-white/5 rounded-xl p-2 flex gap-3 items-center">
                    <img src="${w.cover}" class="w-12 h-12 rounded object-cover">
                    <div class="flex-1 min-w-0">
                        <p class="font-bold text-[10px] truncate">${w.title}</p>
                    </div>
                </div>
            `).join('');
            document.getElementById('lib-grid').innerHTML = html || '<p class="text-gray-600 text-[10px]">作品がありません</p>';
        }

        // 録音 (シミュレーション)
        function toggleRecording() {
            const b = document.getElementById('btn-record');
            if(b.innerText.includes('開始')) {
                b.innerText = '録音停止中...';
                b.classList.replace('bg-white', 'bg-red-600');
                b.classList.replace('text-black', 'text-white');
            } else {
                b.innerText = '録音を開始する';
                b.classList.replace('bg-red-600', 'bg-white');
                b.classList.replace('text-white', 'text-black');
            }
        }

        initProfile();
        renderHome();
    </script>
</body>
</html>
