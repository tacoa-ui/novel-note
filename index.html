<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小説note 2026 完全版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --lime: #A6F21A; --bg: #000000; }
        body { background-color: var(--bg); color: white; padding-bottom: 120px; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .text-lime { color: var(--lime); }
        .bg-lime { background-color: var(--lime); color: black; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; color: #555; font-weight: bold; }
        .nav-btn.active { color: var(--lime); }
        input, textarea, select { background: rgba(255,255,255,0.1); border: 1px solid transparent; border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; }
    </style>
</head>
<body>

    <header class="p-4 sticky top-0 bg-black/95 z-50">
        <input type="text" id="global-search" oninput="renderHome()" placeholder="作者・タイトル・タグ・ライブ・room..." class="mb-3">
        <h1 class="text-3xl font-black text-lime italic">小説note</h1>
    </header>

    <main id="app-content">
        <section id="page-home" class="page-section active p-4 space-y-8">
            <div class="flex overflow-x-auto gap-4 no-scrollbar snap-x">
                <div class="min-w-full h-48 bg-lime rounded-[2.5rem] p-8 flex flex-col justify-between text-black snap-center">
                    <h2 class="text-2xl font-black">理想の物語はあなたしか書けない<br><span class="text-sm opacity-60">さぁ思いっきり楽しもう！</span></h2>
                    <button onclick="showModal('modal-terms')" class="bg-black text-white text-[10px] px-6 py-2 rounded-full w-fit">利用規約を見る</button>
                </div>
                <div class="min-w-full h-48 bg-blue-600 rounded-[2.5rem] p-8 flex flex-col justify-center text-white snap-center">
                    <h2 class="text-3xl font-black italic">連載は自由。<br>楽しむのも自由。</h2>
                </div>
                <div class="min-w-full h-48 bg-purple-700 rounded-[2.5rem] p-8 flex flex-col justify-center text-white snap-center">
                    <h2 class="text-3xl font-black italic text-center">あなたのファンはここに</h2>
                </div>
            </div>

            <div id="home-live-section" class="hidden">
                <h3 class="font-black text-red-500 text-xs mb-4">● ライブ配信中</h3>
                <div id="home-live-list"></div>
            </div>

            <div>
                <h3 class="font-black text-lime text-xs mb-4 uppercase">Following Works</h3>
                <div id="home-follow-list" class="flex gap-4 overflow-x-auto no-scrollbar"></div>
            </div>

            <div>
                <h3 class="font-black text-blue-400 text-xs mb-4 uppercase">Subscribed Rooms</h3>
                <div id="home-room-list" class="flex gap-4 overflow-x-auto no-scrollbar"></div>
            </div>

            <div>
                <h3 class="font-black text-xs mb-4">TOPクリエイター</h3>
                <div id="home-top-creators" class="flex gap-4 overflow-x-auto no-scrollbar"></div>
            </div>
        </section>

        <section id="page-ranking" class="page-section p-4 space-y-12">
            <h2 class="text-2xl font-black border-l-4 border-lime pl-4 italic">ランキング一覧</h2>
            <div><h3 class="font-bold mb-4 opacity-50">TOP 作品40</h3><div id="rank-works" class="grid grid-cols-2 gap-4"></div></div>
            <div><h3 class="font-bold mb-4 opacity-50">TOP room40</h3><div id="rank-rooms" class="grid grid-cols-2 gap-4"></div></div>
            <div><h3 class="font-bold mb-4 opacity-50">最新の作品40</h3><div id="rank-latest" class="grid grid-cols-2 gap-4"></div></div>
            <div><h3 class="font-bold mb-4 text-yellow-500">連続TOPの作品</h3><div id="rank-streak" class="grid grid-cols-2 gap-4"></div></div>
        </section>

        <section id="page-post" class="page-section p-6 space-y-6">
            <h2 class="text-3xl font-black italic">Create</h2>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="openEditor('work')" class="glass p-8 rounded-[2rem] text-left border-l-8 border-lime"><p class="text-2xl font-black">作品を投稿</p></button>
                <button onclick="openEditor('room')" class="glass p-8 rounded-[2rem] text-left border-l-8 border-blue-500"><p class="text-2xl font-black">Roomを作成</p></button>
            </div>
        </section>

        <section id="page-library" class="page-section p-4 space-y-6">
            <div class="flex gap-4 border-b border-white/10 pb-2 font-black">
                <button onclick="libTab('bk')" id="lt-bk" class="text-lime border-b-2 border-lime flex-1 py-2">ブックマーク</button>
                <button onclick="libTab('my')" id="lt-my" class="text-gray-500 flex-1 py-2">My作品</button>
            </div>
            <div id="lib-content" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="page-profile" class="page-section p-6 space-y-8 text-center">
            <div class="w-32 h-32 rounded-full border-4 border-lime mx-auto overflow-hidden bg-gray-800">
                <img id="my-icon-p" class="w-full h-full object-cover hidden">
            </div>
            <input type="text" id="my-name-in" class="text-2xl font-black text-center" placeholder="名前を登録">
            <button onclick="saveProf()" class="bg-white text-black px-10 py-2 rounded-full font-black">保存</button>
        </section>
    </main>

    <div id="editor-modal" class="fixed inset-0 bg-black z-[100] hidden p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-black">Editing</h2><button onclick="closeEditor()" class="text-3xl">&times;</button></div>
        <div class="space-y-4">
            <input type="file" accept="image/*" id="ed-file" class="hidden" onchange="preEdCover(this)">
            <label for="ed-file" class="block h-40 glass rounded-2xl flex items-center justify-center overflow-hidden">
                <img id="ed-cover-pre" class="hidden w-full h-full object-cover">
                <span id="ed-label">画像をアップロード</span>
            </label>
            <input type="text" id="ed-title" placeholder="タイトル">
            <textarea id="ed-body" placeholder="本文..." class="h-64"></textarea>
            <button onclick="executePost()" class="w-full bg-lime text-black py-5 rounded-[2rem] font-black">公開する</button>
        </div>
    </div>

    <div id="reader-modal" class="fixed inset-0 bg-black z-[150] hidden flex flex-col overflow-y-auto">
        <header class="p-4 flex justify-between items-center sticky top-0 bg-black">
            <button onclick="closeReader()" class="text-xl">✕</button>
            <button id="rd-follow-btn" onclick="toggleFollow()" class="bg-white text-black px-4 py-1 rounded-full text-xs font-bold">フォロー</button>
        </header>
        <img id="rd-cover" class="w-full h-64 object-cover">
        <div class="p-6">
            <h2 id="rd-title" class="text-3xl font-black mb-2"></h2>
            <p id="rd-author" class="text-lime font-bold mb-6"></p>
            <div id="rd-body" class="text-lg leading-loose mb-10"></div>
            
            <div class="flex gap-4 mb-10">
                <button onclick="rdLike()" class="flex-1 glass py-4 rounded-2xl text-lime font-black"><i class="fa fa-heart"></i> <span id="rd-likes">0</span></button>
                <button onclick="toggleBookmark()" id="rd-bk-btn" class="flex-1 glass py-4 rounded-2xl font-black">🔖 ブクマ</button>
            </div>

            <div class="space-y-4">
                <h3 class="font-black border-b border-white/10 pb-2">コメント</h3>
                <div id="rd-comments" class="text-sm space-y-2 opacity-70"></div>
                <div class="flex gap-2">
                    <input type="text" id="comment-input" placeholder="コメントを書く..." class="text-xs">
                    <button onclick="addComment()" class="bg-lime text-black px-4 rounded-xl">送信</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black/90 border-t border-white/10 flex justify-around p-4 pb-8 z-[60]">
        <button onclick="switchTab('home')" class="nav-btn active"><i class="fa fa-house"></i><span>ホーム</span></button>
        <button onclick="switchTab('ranking')" class="nav-btn"><i class="fa fa-trophy"></i><span>ランク</span></button>
        <button onclick="switchTab('post')" class="nav-btn"><i class="fa fa-plus"></i><span>投稿</span></button>
        <button onclick="switchTab('library')" class="nav-btn"><i class="fa fa-book"></i><span>書庫</span></button>
        <button onclick="switchTab('profile')" class="nav-btn"><i class="fa fa-user"></i><span>プロフ</span></button>
    </nav>

    <script>
        let state = JSON.parse(localStorage.getItem('NOVEL_NOTE_FINAL')) || {
            me: { name: '名無し', icon: '', following: [], bookmarks: [] },
            works: [], 
            rooms: []
        };
        const save = () => { localStorage.setItem('NOVEL_NOTE_FINAL', JSON.stringify(state)); renderHome(); renderRank(); };

        function switchTab(id) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.getElementById('page-'+id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        /* --- 投稿機能 --- */
        let currentEditMode = 'work';
        let tempCover = "";
        function openEditor(mode) { currentEditMode = mode; document.getElementById('editor-modal').classList.remove('hidden'); }
        function closeEditor() { document.getElementById('editor-modal').classList.add('hidden'); }
        function preEdCover(input) {
            if(input.files[0]) {
                const r = new FileReader();
                r.onload = e => { tempCover = e.target.result; document.getElementById('ed-cover-pre').src = tempCover; document.getElementById('ed-cover-pre').classList.remove('hidden'); document.getElementById('ed-label').classList.add('hidden'); };
                r.readAsDataURL(input.files[0]);
            }
        }
        function executePost() {
            const title = document.getElementById('ed-title').value;
            const body = document.getElementById('ed-body').value;
            if(!title || !tempCover) return alert("画像とタイトルを入力してください");
            
            const newItem = { id: Date.now(), title, body, cover: tempCover, author: state.me.name, likes: 0, comments: [] };
            if(currentEditMode === 'work') state.works.unshift(newItem);
            else state.rooms.unshift(newItem);
            
            save(); closeEditor(); switchTab('home');
            alert("公開しました！");
        }

        /* --- ホーム・ランク表示 --- */
        function renderHome() {
            const fWorks = state.works.filter(w => state.me.following.includes(w.author));
            document.getElementById('home-follow-list').innerHTML = fWorks.map(renderCard).join('') || '<p class="text-[10px] opacity-30">フォローした作者の作品が表示されます</p>';
            document.getElementById('home-room-list').innerHTML = state.rooms.map(renderCard).join('') || '<p class="text-[10px] opacity-30">作成されたRoomが表示されます</p>';
            
            const creators = [...new Set(state.works.map(w => w.author))];
            document.getElementById('home-top-creators').innerHTML = creators.map(c => `<div class="flex flex-col items-center gap-1 min-w-[60px]"><div class="w-10 h-10 rounded-full bg-lime text-black flex items-center justify-center font-black">👤</div><p class="text-[9px]">${c}</p></div>`).join('');
        }

        function renderRank() {
            const sorted = [...state.works].sort((a,b)=>b.likes - a.likes);
            document.getElementById('rank-works').innerHTML = sorted.slice(0,40).map(renderCard).join('');
            document.getElementById('rank-latest').innerHTML = [...state.works].reverse().slice(0,40).map(renderCard).join('');
        }

        function renderCard(w) {
            return `<div class="min-w-[140px] glass rounded-2xl overflow-hidden" onclick="openReader(${w.id})">
                <img src="${w.cover}" class="w-full h-24 object-cover">
                <div class="p-2 text-[10px]"><p class="font-black truncate">${w.title}</p><p class="opacity-50">${w.author}</p></div>
            </div>`;
        }

        /* --- 閲覧・フォロー・ブクマ・コメント --- */
        let currentReadId = null;
        function openReader(id) {
            currentReadId = id;
            const w = state.works.find(x => x.id === id) || state.rooms.find(x => x.id === id);
            document.getElementById('reader-modal').classList.remove('hidden');
            document.getElementById('rd-title').innerText = w.title;
            document.getElementById('rd-cover').src = w.cover;
            document.getElementById('rd-author').innerText = "by " + w.author;
            document.getElementById('rd-body').innerText = w.body;
            updateReaderUI();
        }
        function closeReader() { document.getElementById('reader-modal').classList.add('hidden'); }

        function updateReaderUI() {
            const w = state.works.find(x => x.id === currentReadId) || state.rooms.find(x => x.id === currentReadId);
            document.getElementById('rd-likes').innerText = w.likes;
            document.getElementById('rd-comments').innerHTML = w.comments.map(c => `<p><b>${c.user}:</b> ${c.text}</p>`).join('');
            document.getElementById('rd-follow-btn').innerText = state.me.following.includes(w.author) ? "フォロー中" : "フォロー";
            document.getElementById('rd-bk-btn').innerText = state.me.bookmarks.includes(currentReadId) ? "🔖 ブクマ済" : "🔖 ブクマ";
        }

        function rdLike() { 
            const w = state.works.find(x => x.id === currentReadId) || state.rooms.find(x => x.id === currentReadId);
            w.likes++; save(); updateReaderUI(); 
        }

        function addComment() {
            const inp = document.getElementById('comment-input');
            if(!inp.value) return;
            const w = state.works.find(x => x.id === currentReadId) || state.rooms.find(x => x.id === currentReadId);
            w.comments.push({ user: state.me.name, text: inp.value });
            inp.value = ""; save(); updateReaderUI();
        }

        function toggleFollow() {
            const w = state.works.find(x => x.id === currentReadId) || state.rooms.find(x => x.id === currentReadId);
            if(state.me.following.includes(w.author)) state.me.following = state.me.following.filter(a => a !== w.author);
            else state.me.following.push(w.author);
            save(); updateReaderUI();
        }

        function toggleBookmark() {
            if(state.me.bookmarks.includes(currentReadId)) state.me.bookmarks = state.me.bookmarks.filter(id => id !== currentReadId);
            else state.me.bookmarks.push(currentReadId);
            save(); updateReaderUI();
        }

        function libTab(type) {
            const list = type === 'my' ? state.works.filter(w => w.author === state.me.name) : state.works.filter(w => state.me.bookmarks.includes(w.id));
            document.getElementById('lib-content').innerHTML = list.map(renderCard).join('') || '<p class="col-span-2 opacity-30 text-center py-10">まだありません</p>';
        }

        function saveProf() {
            state.me.name = document.getElementById('my-name-in').value || '名無し';
            save(); alert("名前を保存しました");
        }

        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function hideModal(id) { document.getElementById(id).classList.add('hidden'); }

        // 初期化
        renderHome();
        renderRank();
    </script>
</body>
</html>
